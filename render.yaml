services:
  - type: web
    name: learnforge
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn remedial_app.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
