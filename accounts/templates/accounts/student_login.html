{% extends 'base.html' %}
{% block title %}Student Login - Remedial App{% endblock %}

{% block content %}
<div class="grid" style="min-height: 80vh; place-items: center;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2rem;">
        <div class="text-center mb-2">
            <h1 style="color: var(--primary); margin-bottom: 0.5rem;">Student Login</h1>
            <p class="text-muted">Welcome back! Please enter your details.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-2">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Your username">
            </div>
            <div class="mb-3">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>

        <div class="text-center mt-2">
            <p class="text-muted" style="font-size: 0.9rem;">
                Don't have an account? <a href="{% url 'student_signup' %}">Sign up here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
